spring.application.name=campus-help

# ==========================================
# 1. 端口配置
# ==========================================
server.port=8080

# ==========================================
# 2. 数据库连接配置 (必须修改 username 和 password)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/campus_help?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 3. MyBatis 配置
# ==========================================
# 打印 SQL 语句到控制台，方便调试
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# 开启驼峰命名转换 (数据库 user_name -> Java userName)
mybatis.configuration.map-underscore-to-camel-case=true